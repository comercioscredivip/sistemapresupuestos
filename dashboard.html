<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Sistema de Presupuestos</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="dashboard">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h2>Sistema</h2>
      </div>
      <nav class="sidebar-nav">
        <ul>
          <li>
            <button class="nav-btn active" data-section="presupuesto">
              <span class="nav-icon">&#128202;</span>
              Presupuesto
            </button>
          </li>
        </ul>
      </nav>
      <div class="sidebar-footer">
        <button id="logoutBtn" class="btn btn-logout">Cerrar Sesión</button>
      </div>
    </aside>
    <main class="main-content">
      <header class="topbar">
        <button id="menuToggle" class="menu-toggle">&#9776;</button>
        <h2 id="sectionTitle">Presupuesto</h2>
        <div class="user-info">
          <span id="displayUser">usuario</span>
        </div>
      </header>
      <section id="section-presupuesto" class="content-section active">
        <div class="card">
          <div class="card-header">
            <h3>CrediVip - Simplicomp</h3>
          </div>
          <div class="card-body">
            <h3 class="sub-title">Comercio 1</h3>
            <div class="form-group admin-only" id="comercioGroup" style="display:none;">
              <label for="comercioSelect">Comercio</label>
              <select id="comercioSelect">
                <option value="comercio1">Comercio 1</option>
                <option value="comercio2">Comercio 2</option>
                <option value="admin">Administrador</option>
              </select>
            </div>
            <form id="presupuestoForm">
              <div class="form-group">
                <label for="monto">Monto del crédito</label>
                <input type="number" id="monto" placeholder="Ingrese el monto" required>
              </div>
              <div class="form-group">
                <label for="anio">Plan (Año)</label>
                <select id="anio">
                  <option value="g1">Año 2006 a 2010</option>
                  <option value="g2">Año 2011 a 2015</option>
                  <option value="g3">Año 2016 a 2026</option>
                </select>
              </div>
              <button type="submit" class="btn btn-primary btn-lg">Calcular</button>
            </form>
            <hr class="divider">
            <h2 class="section-title">Presupuesto</h2>
            <p class="select-cuotas-hint">Seleccione las cuotas deseadas:</p>
            <div class="table-wrapper">
              <table class="simul-table">
                <thead><tr><th>Seleccionar</th><th>Cuotas</th><th>Valor de la cuota</th></tr></thead>
                <tbody id="resultado"></tbody>
              </table>
            </div>
            <div class="datos-adicionales">
              <h3 class="datos-title">Datos del solicitante (opcional)</h3>
              <div class="form-row">
                <div class="form-group">
                  <label for="formDni">DNI</label>
                  <input type="text" id="formDni" placeholder="Número de DNI">
                </div>
                <div class="form-group">
                  <label for="formNombre">Nombre completo</label>
                  <input type="text" id="formNombre" placeholder="Nombre y apellido">
                </div>
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label for="formTelefono">Teléfono</label>
                  <input type="text" id="formTelefono" placeholder="Número de teléfono">
                </div>
                <div class="form-group"></div>
              </div>
            </div>
            <a id="waLink" class="btn btn-wa" target="_blank">Solicitar crédito por WhatsApp</a>
          </div>
        </div>
      </section>
    </main>
  </div>
  <script src="js/script.js"></script>
</body>
</html>
