<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Sistema de Presupuestos</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="dashboard">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h2>Sistema</h2>
      </div>
      <nav class="sidebar-nav">
        <ul>
          <li>
            <button class="nav-btn active" data-section="presupuesto">
              <span class="nav-icon">&#128202;</span>
              Presupuesto
            </button>
          </li>
          <li>
            <button class="nav-btn" data-section="formulario">
              <span class="nav-icon">&#128221;</span>
              Formulario
            </button>
          </li>
          <li>
            <button class="nav-btn" data-section="historial" disabled style="opacity:0.5;">
              <span class="nav-icon">&#128214;</span>
              Historial
            </button>
          </li>
          <li>
            <button class="nav-btn" data-section="config" disabled style="opacity:0.5;">
              <span class="nav-icon">&#9881;</span>
              Configuración
            </button>
          </li>
        </ul>
      </nav>
      <div class="sidebar-footer">
        <button id="logoutBtn" class="btn btn-logout">Cerrar Sesión</button>
      </div>
    </aside>
    <main class="main-content">
      <header class="topbar">
        <button id="menuToggle" class="menu-toggle">&#9776;</button>
        <h2 id="sectionTitle">Presupuesto</h2>
        <div class="user-info">
          <span id="displayUser">usuario</span>
        </div>
      </header>
      <section id="section-presupuesto" class="content-section active">
        <div class="card">
          <div class="card-header">
            <h3>CrediVip - Simplicomp</h3>
          </div>
          <div class="card-body">
            <h3 class="sub-title">Comercio 1</h3>
            <form id="presupuestoForm">
              <div class="form-group admin-only" id="comercioGroup" style="display:none;">
                <label for="comercioSelect">Comercio</label>
                <select id="comercioSelect">
                  <option value="comercio1">Comercio 1</option>
                  <option value="comercio2">Comercio 2</option>
                  <option value="admin">Administrador</option>
                </select>
              </div>
              <div class="form-group">
                <label for="anio">Año</label>
                <select id="anio">
                  <option value="g1">Año 2006 a 2010</option>
                  <option value="g2">Año 2011 a 2015</option>
                  <option value="g3">Año 2016 a 2026</option>
                </select>
              </div>
              <div class="form-group">
                <label for="monto">Monto del crédito</label>
                <input type="number" id="monto" placeholder="Ingrese el monto">
              </div>
              <button type="submit" class="btn btn-primary btn-lg">Calcular</button>
            </form>
            <hr class="divider">
            <h2 class="section-title">Presupuesto</h2>
            <div class="table-wrapper">
              <table class="simul-table">
                <thead><tr><th>Cuotas</th><th>Valor de la cuota</th></tr></thead>
                <tbody id="resultado"></tbody>
              </table>
          </div>
        </div>
      </section>
      <section id="section-formulario" class="content-section">
        <div class="card">
          <div class="card-header">
            <h3>Formulario de solicitud</h3>
          </div>
          <div class="card-body">
            <form id="formularioForm">
              <div class="form-group">
                <label for="formDni">DNI</label>
                <input type="text" id="formDni" placeholder="Número de DNI" required>
              </div>
              <div class="form-group">
                <label for="formNombre">Nombre completo</label>
                <input type="text" id="formNombre" placeholder="Nombre y apellido" required>
              </div>
              <div class="form-group">
                <label for="formMonto">Monto del crédito</label>
                <input type="number" id="formMonto" placeholder="Ingrese el monto" required>
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label for="formPlan">Plan</label>
                  <select id="formPlan">
                    <option value="2006-2010">2006 a 2010</option>
                    <option value="2011-2015">2011 a 2015</option>
                    <option value="2016-2026">2016 a 2026</option>
                  </select>
                </div>
                <div class="form-group">
                  <label for="formCuotas">Cuotas</label>
                  <select id="formCuotas">
                    <option value="12">12 cuotas</option>
                    <option value="18">18 cuotas</option>
                    <option value="24">24 cuotas</option>
                  </select>
                </div>
              </div>
              <button type="submit" class="btn btn-wa btn-lg">Enviar por WhatsApp</button>
            </form>
          </div>
        </div>
      </section>
      <section id="section-historial" class="content-section">
        <p>Sección en desarrollo...</p>
      </section>
      <section id="section-config" class="content-section">
        <p>Sección en desarrollo...</p>
      </section>
    </main>
  </div>
  <script src="js/script.js"></script>
</body>
</html>
